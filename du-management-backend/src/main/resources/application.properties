spring.application.name=du-management-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/du_management
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Base64-encoded key for HS256 JWT signing.
app.jwt.secret=VGhpc0lzQVN1ZmZpY2llbnRseUxvbmdTZWN1cmVLRXlGb3JEVU1hbmFnZW1lbnQxMjM0NQ==
app.jwt.expiration-ms=86400000

app.rbac.seed-default-users=true
app.rbac.default-admin-password=Admin@123
app.rbac.default-hr-password=Hr@123
app.rbac.default-member-password=Member@123

# Gmail SMTP configuration (set env vars in runtime)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Notification feature switches
app.notification.scheduler.poll-ms=30000
app.notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:false}
app.notification.email.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@du-manager.local}}
