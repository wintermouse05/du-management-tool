spring.application.name=du-management-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/du_management
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Base64-encoded key for HS256 JWT signing.
# Use APP_JWT_SECRET in production; fallback below is for local development only.
app.jwt.secret=${APP_JWT_SECRET:TVlfREVWX0pXVF9TRUNSRVRfMzJfQllURVNfTUlOX0xFTkdUSA==}
app.jwt.expiration-ms=86400000

app.rbac.seed-default-users=${APP_RBAC_SEED_DEFAULT_USERS:true}
app.rbac.default-admin-password=${APP_DEFAULT_ADMIN_PASSWORD:Admin@123}
app.rbac.default-hr-password=${APP_DEFAULT_HR_PASSWORD:Hr@123}
app.rbac.default-member-password=${APP_DEFAULT_MEMBER_PASSWORD:Member@123}

# Gmail SMTP configuration (set env vars in runtime)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Notification feature switches
app.notification.scheduler.poll-ms=30000
app.notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:false}
app.notification.email.from=${MAIL_FROM:${MAIL_USERNAME:no-reply@du-manager.local}}

app.upload.seminar-dir=${SEMINAR_UPLOAD_DIR:uploads/seminars}
