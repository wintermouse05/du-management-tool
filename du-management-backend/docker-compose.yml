services:
  postgres:
    image: postgres:16-alpine
    container_name: du_management_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: du_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d du_management"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
